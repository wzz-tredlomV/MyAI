name: Train Chatbot Transformer

on:
  push:
    branches: [ main, master ]
    paths:
      - 'data/**'
      - 'train.py'
      - 'model.py'
      - 'data_utils.py'
      - '.github/workflows/train.yml'
  workflow_dispatch:          # 允许手动触发
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '20'
      batch_size:
        description: 'Batch size (adjust based on available memory)'
        required: false
        default: '16'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360       # 6小时，可根据需求调整

    # 若需使用 GPU，请将 runs-on 改为 self-hosted 并配置 GPU Runner
    # runs-on: [self-hosted, linux, gpu]

    env:
      PYTHONUNBUFFERED: 1
      # 训练超参数可通过 workflow_dispatch 输入覆盖
      EPOCHS: ${{ github.event.inputs.epochs || 50 }}
      BATCH_SIZE: ${{ github.event.inputs.batch_size || 16 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install tokenizers numpy
          # 若项目中有 requirements.txt 则使用：pip install -r requirements.txt

      - name: Verify data file exists
        run: |
          if [ ! -f data/conversations.json ]; then
            echo "::error::Missing data/conversations.json. Please add your dataset before training."
            exit 1
          fi

      - name: Create necessary directories
        run: |
          mkdir -p tokenizer checkpoints

      - name: Run training script
        run: |
          python train.py
        # 如果 train.py 支持命令行参数，请相应调整；否则可通过环境变量传递

      - name: Upload trained model and tokenizer
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-model
          path: |
            checkpoints/best_model.pt
            tokenizer/bpe_tokenizer.json
          retention-days: 30