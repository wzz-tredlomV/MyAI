name: Train and Inference

on:
  workflow_dispatch:
  push:
    paths:
      - '**.py'
      - 'requirements.txt'

jobs:
  train_and_infer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Run inference to generate image
        run: |
          mkdir -p outputs
          python chat.py

