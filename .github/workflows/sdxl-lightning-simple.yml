- name: Pull and run SD WebUI with pre-downloaded model
        run: |
          # 先在本地下载模型
          mkdir -p models
          wget -q -O models/model.safetensors \
            "https://huggingface.co/runwayml/stable-diffusion-v1-5/resolve/main/v1-5-pruned-emaonly.safetensors" \
            || wget -q -O models/model.safetensors \
            "https://modelscope.cn/models/AI-ModelScope/stable-diffusion-v1-5/resolve/master/v1-5-pruned-emaonly.safetensors"
          
          # 启动容器并挂载模型
          docker run -d \
            --name sd-webui \
            -p 7860:7860 \
            -v $(pwd)/models:/app/models/Stable-diffusion:ro \
            -v $(pwd)/outputs:/app/outputs \
            -e CLI_ARGS="--api --nowebui --skip-torch-cuda-test --no-half --use-cpu all" \
            atinoda/sd-webui:latest
          
          sleep 90  # 等待启动