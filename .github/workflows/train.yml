name: CPU Training - TF/NumPy/Pillow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tensorflow tensorboard numpy pillow scikit-learn  # tensorflow-cpu 纯 CPU 版
      
      - name: Verify TF CPU
        run: |
          python -c "import tensorflow as tf; print('TF version:', tf.__version__); print('GPU可用:', tf.config.list_physical_devices('GPU'))"
      
      - name: Run training
        run: |
          export OMP_NUM_THREADS=4
          export TF_NUM_INTEROP_THREADS=4
          export TF_NUM_INTRAOP_THREADS=4
          python train.py --data_root ./data --epochs 100 --batch_size 32 --export
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: model-output-${{ github.run_id }}
          path: |
            ./*
