name: Stable Diffusion CPU

on:
  workflow_dispatch:  # 手动触发
    inputs:
      prompt:
        description: '提示词'
        required: true
        default: 'a beautiful sunset over mountains'
      negative_prompt:
        description: '负面提示词'
        required: false
        default: ''
      steps:
        description: '采样步数'
        required: false
        default: '20'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git libgl1 libglib2.0-0
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      
      - name: Clone SD WebUI
        run: |
          git clone --depth 1 https://github.com/AUTOMATIC1111/stable-diffusion-webui.git
          cd stable-diffusion-webui
          pip install -r requirements.txt
      
      - name: Download model
        run: |
          mkdir -p stable-diffusion-webui/models/Stable-diffusion
          wget -q -O stable-diffusion-webui/models/Stable-diffusion/model.safetensors \
            "https://huggingface.co/runwayml/stable-diffusion-v1-5/resolve/main/v1-5-pruned-emaonly.safetensors"
      
      - name: Generate image (API mode)
        run: |
          cd stable-diffusion-webui
          
          # 启动 WebUI 后台（CPU模式，跳过模型加载检查）
          python launch.py --skip-torch-cuda-test --no-half --use-cpu all --api --nowebui &
          
          # 等待启动
          sleep 120
          
          # 调用 API 生成图片
          curl -X POST "http://127.0.0.1:7860/sdapi/v1/txt2img" \
            -H "Content-Type: application/json" \
            -d '{
              "prompt": "${{ github.event.inputs.prompt }}",
              "negative_prompt": "${{ github.event.inputs.negative_prompt }}",
              "steps": ${{ github.event.inputs.steps }},
              "width": 512,
              "height": 512,
              "sampler_index": "Euler a"
            }' -o output.json
          
          # 提取 base64 图片并保存
          python3 << 'EOF'
          import json
          import base64
          with open('output.json') as f:
              data = json.load(f)
          img_data = base64.b64decode(data['images'][0])
          with open('../generated_image.png', 'wb') as f:
              f.write(img_data)
          print("Image saved to generated_image.png")
          EOF
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-image
          path: generated_image.png
