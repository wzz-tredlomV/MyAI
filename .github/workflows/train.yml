name: Train and Inference

on:
  workflow_dispatch:

jobs:
  train_and_infer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Prepare sample data
        run: |
          python scripts/create_sample_data.py --output_dir ./data --num_samples 10

      - name: Train model
        run: python train.py --data_root ./data --epochs 1 --batch_size 2 --export

      - name: Run inference to generate image
        run: |
          mkdir -p outputs
          python inference.py --model_path ./saved_model --description "a red apple on a wooden table" --target_size 128 --output_dir outputs

      - name: Upload model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: saved_model
          path: |
            saved_model

      - name: Upload one generated image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated_image
          path: |
            outputs/*.png