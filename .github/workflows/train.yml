name: Train Model

on:
  workflow_dispatch:         # 允许手动触发
  push:
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/train.yml'

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'          # 可按实际需要选择版本

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pip
          
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare sample data
        run: |
          python scripts/create_sample_data.py --output_dir ./data --num_samples 10

      - name: Train model
        run: python train.py --data_root ./data --epochs 1 --batch_size 2

      # 如需保存模型到 artifact，可解注释下面内容
      # - name: Archive checkpoint
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: checkpoints
      #     path: ./checkpoints