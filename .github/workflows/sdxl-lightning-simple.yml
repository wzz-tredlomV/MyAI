name: Image Generation AI - CPU

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.10'
  # 使用Stable Diffusion WebUI的CPU版本
  WEBUI_REPO: 'AUTOMATIC1111/stable-diffusion-webui'
  WEBUI_BRANCH: 'master'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
    # 检出代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 设置Python环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    # 安装系统依赖
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget git python3-pip python3-venv libgl1 libglib2.0-0
        
    # 克隆Stable Diffusion WebUI
    - name: Clone Stable Diffusion WebUI
      run: |
        git clone --depth 1 --branch ${{ env.WEBUI_BRANCH }} https://github.com/${{ env.WEBUI_REPO }}.git sd-webui
        cd sd-webui
        
    # 创建虚拟环境并安装依赖
    - name: Install Python dependencies
      run: |
        cd sd-webui
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip wheel
        # 安装CPU版本的PyTorch
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        # 安装其他依赖
        pip install -r requirements.txt
        
    # 下载模型（示例：SD 1.5基础模型）
    - name: Download base model
      run: |
        cd sd-webui
        mkdir -p models/Stable-diffusion
        # 下载SD 1.5基础模型（约4GB）
        wget -q --show-progress -O models/Stable-diffusion/v1-5-pruned-emaonly.safetensors \
          "https://huggingface.co/runwayml/stable-diffusion-v1-5/resolve/main/v1-5-pruned-emaonly.safetensors" \
        || echo "模型下载失败，将使用空模型启动"
        
    # 启动WebUI服务（CPU模式）
    - name: Run WebUI
      run: |
        cd sd-webui
        source venv/bin/activate
        # 使用--skip-torch-cuda-test跳过CUDA检查，强制CPU模式
        # 使用--share参数创建公开链接（可选）
        python launch.py --skip-torch-cuda-test --listen --port 7860 &
        
        # 等待服务启动并测试
        echo "等待服务启动..."
        sleep 30
        
        # 简单测试 - 生成一张图片
        echo "测试生成图片..."
        python -c "
import requests
import json
import time

# 等待服务完全启动
time.sleep(10)

# 测试文生图API
payload = {
    'prompt': 'a beautiful landscape, mountains, sunset, high quality',
    'steps': 20,
    'width': 512,
    'height': 512,
    'sampler_name': 'Euler a',
    'cfg_scale': 7.5,
    'seed': -1
}

try:
    response = requests.post('http://127.0.0.1:7860/sdapi/v1/txt2img', 
                          json=payload, timeout=120)
    result = response.json()
    if 'images' in result and len(result['images']) > 0:
        print('✅ 图片生成测试成功！')
        # 保存测试图片
        import base64
        with open('test_output.png', 'wb') as f:
            f.write(base64.b64decode(result['images'][0]))
        print('测试图片已保存为 test_output.png')
    else:
        print('❌ 测试失败，未获取到图片')
        
except Exception as e:
    print(f'测试出错: {e}')
        "
        
    # 上传生成的测试图片作为Artifacts（可选）
    - name: Upload test image
      uses: actions/upload-artifact@v4
      if: always()
      with:
      name: test-generated-image
        path: sd-webui/test_output.png
        retention-days: 1